<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftGram - البروفايل</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">SoftGram</a>
    <ul>
      <li><a href="index.html">🏠 الرئيسية</a></li>
      <li><a href="explore.html">🔍 اكتشاف</a></li>
      <li><a href="messages.html">💬 الرسائل</a></li>
      <li><a href="notifications.html">🔔 الإشعارات</a></li>
      <li><a href="profile.html">👤 البروفايل</a></li>
      <li><a href="login.html">🔑 تسجيل الدخول</a></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>👤 بروفايل <span id="username"></span></h1>
    <p>إدارة حسابك وبيانتك الشخصية</p>
  </section>

  <!-- Profile Stats -->
  <div class="stats-section" style="max-width: 600px; margin: 20px auto;">
    <div class="stat-card">
      <h3 id="posts-count">0</h3>
      <p>البوستات</p>
    </div>
    <div class="stat-card">
      <h3 id="followers-count">0</h3>
      <p>المتابعون</p>
    </div>
    <div class="stat-card">
      <h3 id="following-count">0</h3>
      <p>المتابع</p>
    </div>
  </div>

  <!-- Profile Settings -->
  <div style="max-width: 600px; margin: 20px auto;">
    <div style="background: white; padding: 20px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 20px;">
      <h2 style="margin-bottom: 15px;">⚙️ الإعدادات</h2>
      <button onclick="showSettings()" style="width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 10px;">إعدادات الخصوصية</button>
      <button onclick="exportData.exportJSON()" style="width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 10px;">تنزيل البيانات</button>
      <button onclick="backups.createBackup()" style="width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 10px;">عمل نسخة احتياطية</button>
      <button onclick="logout()" style="width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer;">🚪 تسجيل الخروج</button>
    </div>

    <!-- User Posts -->
    <div style="background: white; padding: 20px; border: 1px solid var(--border-color); border-radius: 8px;">
      <h2 style="margin-bottom: 15px;">📸 بوستاتي</h2>
      <div id="user-posts" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;"></div>
    </div>
  </div>

  <!-- Privacy Settings Modal -->
  <div id="settings-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 500px;">
      <h2>إعدادات الخصوصية</h2>
      <label style="display: flex; align-items: center; margin: 15px 0;">
        <input type="checkbox" id="private-account" style="margin-right: 10px;">
        <span>حساب خاص</span>
      </label>
      <label style="display: flex; align-items: center; margin: 15px 0;">
        <input type="checkbox" id="allow-messages" style="margin-right: 10px;">
        <span>السماح بالرسائل المباشرة</span>
      </label>
      <label style="display: flex; align-items: center; margin: 15px 0;">
        <input type="checkbox" id="allow-comments" style="margin-right: 10px;">
        <span>السماح بالتعليقات</span>
      </label>
      <label style="display: flex; align-items: center; margin: 15px 0;">
        <input type="checkbox" id="show-activity" style="margin-right: 10px;">
        <span>إظهار النشاط</span>
      </label>
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button onclick="saveSettings()" style="flex: 1; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer;">حفظ</button>
        <button onclick="closeSettings()" style="flex: 1; padding: 10px; background: var(--border-color); border: none; border-radius: 6px; cursor: pointer;">إلغاء</button>
      </div>
    </div>
  </div>

  <script src="features.js"></script>
  <script src="profile.js"></script>
</body>
</html>
