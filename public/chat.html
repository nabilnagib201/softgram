  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">SoftGram</a>
    <ul>
      <li><a href="index.html">🏠 الرئيسية</a></li>
      <li><a href="explore.html">🔍 اكتشاف</a></li>

  <section class="hero">
    <h1>💬 غرفة الدردشة <span>العامة</span></h1>
    <p>اتكلم مع كل المستخدمين في نفس الوقت</p>
  </section>

  <div id="typing-indicator" style="display: none;"></div>

  <div id="chat-box"></div>

  <footer>
    <input type="text" id="chat-input" placeholder="اكتب رسالة هنا..." oninput="handleTypingStatus()">
    <button onclick="sendMessage()">إرسال</button>
  </footer>

  <script src="features.js"></script>
  <script src="chat.js"></script>

  <script>
    let typingTimeout;
    function handleTypingStatus() {
      const currentUser = localStorage.getItem("currentUser") || "ضيف";
      // محاكاة إرسال حالة الكتابة (في التطبيق الفعلي ترسل عبر WebSocket أو API)
      typingIndicator.setUserTyping(currentUser, true);
      
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        typingIndicator.setUserTyping(currentUser, false);
      }, 2000); // يختفي المؤشر بعد ثانيتين من التوقف عن الكتابة
    }

    // تعديل بسيط على دالة الاستلام لعرض الشارات (سيقوم السكريبت بدمجها تلقائياً)
    // عند استدعاء renderMessage في ملف chat.js سيتم قراءة كائن verificationSystem
  </script>
</body>
</html>
