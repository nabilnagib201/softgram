<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftGram - الرسائل</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">SoftGram</a>
    <ul>
      <li><a href="index.html">🏠 الرئيسية</a></li>
      <li><a href="explore.html">🔍 اكتشاف</a></li>
      <li><a href="messages.html">💬 الرسائل</a></li>
      <li><a href="chat.html">💬 الشات العام</a></li>
      <li><a href="notifications.html">🔔 الإشعارات</a></li>
      <li><a href="profile.html">👤 البروفايل</a></li>
      <li><a href="login.html">🔑 تسجيل الدخول</a></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>💬 الرسائل المباشرة</h1>
    <p>تواصل مع أصدقائك بشكل خاص</p>
  </section>

  <div style="max-width: 800px; margin: 0 auto; display: flex; gap: 20px; padding: 20px;">
    <!-- Conversations List -->
    <div style="flex: 0 0 250px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border-color); overflow-y: auto; max-height: 500px;">
      <div style="padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: 600;">المحادثات</div>
      <div id="conversations-list"></div>
      <input type="text" id="new-recipient" placeholder="إرسال رسالة إلى..." style="width: calc(100% - 20px); padding: 10px; border: 1px solid var(--border-color); border-top: 1px solid var(--border-color);"/>
    </div>

    <!-- Chat Box -->
    <div style="flex: 1; background: var(--surface); border-radius: 8px; border: 1px solid var(--border-color); display: flex; flex-direction: column;">
      <div style="padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: 600;" id="chat-header">اختر محادثة</div>
      <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;"></div>
      <div style="padding: 15px; border-top: 1px solid var(--border-color); display: flex; gap: 10px;">
        <input type="text" id="message-input" placeholder="اكتب رسالة..." style="flex: 1; padding: 10px; border: 1px solid var(--border-color); border-radius: 20px;"/>
        <button onclick="sendDM()" style="background: var(--accent); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem;">📤</button>
      </div>
    </div>
  </div>

  <script src="features.js"></script>
  <script src="app.js"></script>
  <script>
    let currentConversation = null;

    function displayConversations() {
      const list = document.getElementById('conversations-list');
      const conversations = Object.keys(directMessages.messages);
      list.innerHTML = conversations.map(conv => `
        <div onclick="openConversation('${conv}')" style="padding: 12px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='var(--secondary)'" onmouseout="this.style.background='var(--surface)'">
          ${conv}
        </div>
      `).join('');
    }

    function openConversation(conversationKey) {
      currentConversation = conversationKey;
      const [user1, user2] = conversationKey.split('-');
      const otherUser = localStorage.getItem("currentUser") === user1 ? user2 : user1;
      
      document.getElementById('chat-header').textContent = `💬 ${otherUser}`;
      
      const messages = directMessages.getConversation(otherUser);
      const messagesDiv = document.getElementById('chat-messages');
      
      messagesDiv.innerHTML = messages.map(msg => `
        <div style="align-self: ${msg.from === localStorage.getItem("currentUser") ? 'flex-end' : 'flex-start'}; background: ${msg.from === localStorage.getItem("currentUser") ? 'var(--accent)' : 'var(--secondary)'}; color: ${msg.from === localStorage.getItem("currentUser") ? 'white' : 'var(--text-dark)'}; padding: 10px 15px; border-radius: 15px; max-width: 70%;">
          ${msg.text}
          <div style="font-size: 0.8rem; margin-top: 5px; opacity: 0.7;">${msg.timestamp}</div>
        </div>
      `).join('');
      
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      directMessages.markAsRead(otherUser);
    }

    function sendDM() {
      const recipientInput = document.getElementById('new-recipient');
      const messageInput = document.getElementById('message-input');
      const recipient = recipientInput.value.trim() || currentConversation?.split('-')[1];
      const message = messageInput.value.trim();

      if (!recipient || !message) return alert('أدخل المستقبل والرسالة');

      directMessages.sendMessage(recipient, message);
      messageInput.value = '';
      recipientInput.value = '';
      
      currentConversation = null;
      displayConversations();
      openConversation([localStorage.getItem("currentUser"), recipient].sort().join("-"));
    }

    window.addEventListener('load', displayConversations);
  </script>
</body>
</html>
