<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftGram - الرسائل</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">SoftGram</a>
    <ul>
      <li><a href="index.html">🏠 الرئيسية</a></li>
      <li><a href="explore.html">🔍 اكتشاف</a></li>
      <li><a href="messages.html">💬 الرسائل</a></li>
      <li><a href="chat.html">💬 الشات العام</a></li>
      <li><a href="notifications.html">🔔 الإشعارات</a></li>
      <li><a href="profile.html">👤 البروفايل</a></li>
      <li><a href="login.html">🔑 تسجيل الدخول</a></li>
    </ul>
  </nav>

  <div style="max-width: 900px; margin: 30px auto; display: flex; gap: 20px; padding: 0 20px; height: 550px;">
    <div class="conversations-box" style="flex: 0 0 280px;">
      <div class="conversations-header">
        <span class="header-icon">💬</span>
        <h2>المحادثات المباشرة</h2>
        <span class="chats-count" id="chats-count">0</span>
      </div>
      <div class="new-chat-wrapper">
        <input type="text" id="new-recipient" class="new-chat-input" placeholder="إرسال رسالة إلى...">
      </div>
      <div id="conversations-list" class="conversations-list"></div>
    </div>

    <div style="flex: 1; background: var(--surface); border-radius: 16px; border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-lg);">
      <div style="padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-weight: 700; color: var(--accent); background: rgba(0,0,0,0.1);" id="chat-header">اختر محادثة</div>
      <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: rgba(0, 0, 0, 0.05);"></div>
      <div style="padding: 15px 20px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; background: rgba(0,0,0,0.1); align-items: center;">
        <input type="text" id="message-input" placeholder="اكتب رسالة..." style="flex: 1; padding: 12px 18px; background: var(--bg-light); border: 1px solid var(--border-color); border-radius: 24px; color: var(--text-dark);">
        <button onclick="sendDM()" style="background: var(--accent); color: var(--bg-light); border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; font-weight: bold;">📤</button>
      </div>
    </div>
  </div>

  <script src="features.js"></script>
  <script>
    let currentConversation = null;

    function displayConversations() {
      const list = document.getElementById('conversations-list');
      if (!list || typeof directMessages === 'undefined') return;
      const conversations = Object.keys(directMessages.messages);
      document.getElementById('chats-count').textContent = conversations.length;

      if (conversations.length === 0) {
        list.innerHTML = `<div style="color:var(--text-light); text-align:center; padding:20px;">لا توجد محادثات</div>`;
        return;
      }

      list.innerHTML = conversations.map(conv => {
        const [user1, user2] = conv.split('-');
        const otherUser = localStorage.getItem("currentUser") === user1 ? user2 : user1;
        const isActive = currentConversation === conv ? 'active' : '';
        return `
          <div onclick="openConversation('${conv}')" class="conversation-item ${isActive}">
            <div style="width:36px; height:36px; border-radius:50%; background:var(--secondary); display:flex; align-items:center; justify-content:center; color:var(--accent); font-weight:bold;">${otherUser.charAt(0).toUpperCase()}</div>
            <div style="font-weight:600; color:var(--text-dark);">@${otherUser}</div>
          </div>
        `;
      }).join('');
    }

    function openConversation(conversationKey) {
      currentConversation = conversationKey;
      const [user1, user2] = conversationKey.split('-');
      const otherUser = localStorage.getItem("currentUser") === user1 ? user2 : user1;
      document.getElementById('chat-header').textContent = `💬 المحادثة مع: ${otherUser}`;
      
      const messages = directMessages.getConversation(otherUser);
      const messagesDiv = document.getElementById('chat-messages');
      
      messagesDiv.innerHTML = messages.map(msg => {
        const isMe = msg.from === localStorage.getItem("currentUser");
        return `
          <div style="align-self: ${isMe ? 'flex-end' : 'flex-start'}; background: ${isMe ? 'var(--accent)' : 'var(--secondary)'}; color: ${isMe ? 'var(--bg-light)' : 'var(--text-dark)'}; padding: 12px 16px; border-radius: 14px; max-width: 70%; box-shadow: var(--shadow-sm);">
            <div>${msg.text}</div>
          </div>
        `;
      }).join('');
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      displayConversations();
    }

    function sendDM() {
      const recipientInput = document.getElementById('new-recipient');
      const messageInput = document.getElementById('message-input');
      const recipient = recipientInput.value.trim() || currentConversation?.split('-').find(u => u !== localStorage.getItem("currentUser"));
      const message = messageInput.value.trim();

      if (!recipient || !message) return alert('أدخل اسم المستخدم ونص الرسالة');
      directMessages.sendMessage(recipient, message);
      messageInput.value = '';
      recipientInput.value = '';
      currentConversation = [localStorage.getItem("currentUser"), recipient].sort().join("-");
      displayConversations();
      openConversation(currentConversation);
    }

    window.addEventListener('DOMContentLoaded', () => {
      displayConversations();
      document.getElementById('message-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendDM(); });
    });
  </script>
</body>
</html>
