<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftGram - تسجيل الدخول الآمن</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">SoftGram</a>
    <ul>
      <li><a href="index.html">🏠 الرئيسية</a></li>
    </ul>
  </nav>

  <div class="login-card fade-in">
    <h1>SoftGram Security</h1>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;">نظام دخول محمي ومصادق عليه</p>
    
    <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
    <input type="password" id="password" placeholder="كلمة المرور">
    
    <button onclick="login()" style="background: var(--accent); color: white;">تسجيل الدخول</button>
    <button onclick="signup()" style="background: var(--secondary); color: var(--text-main); margin-top: 5px;">إنشاء حساب جديد</button>
  </div>

  <script src="auth.js"></script>
</body>
</html>
