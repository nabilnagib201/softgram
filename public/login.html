<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftGram - تسجيل الدخول الآمن</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">SoftGram</a>
    <ul>
      <li><a href="index.html">🏠 الرئيسية</a></li>
    </ul>
  </nav>

  <div class="login-card fade-in" style="margin: 50px auto; max-width: 400px; padding: 30px; background: var(--surface); border: 1px solid var(--border-color); border-radius: 12px; text-align: center; box-shadow: var(--shadow-lg);">
    <h1 style="color: var(--accent); margin-bottom: 5px;">SoftGram Security</h1>
    <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 20px;">نظام دخول محمي ومصادق عليه</p>
    
    <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off" style="width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-light); border: 1px solid var(--border-color); color: var(--text-dark); border-radius: 6px;">
    <input type="password" id="password" placeholder="كلمة المرور" style="width: 100%; padding: 12px; margin-bottom: 20px; background: var(--bg-light); border: 1px solid var(--border-color); color: var(--text-dark); border-radius: 6px;">
    
    <button onclick="login()" style="width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: var(--transition);">تسجيل الدخول</button>
    <button onclick="signup()" style="width: 100%; padding: 12px; background: var(--secondary); color: var(--text-dark); border: 1px solid var(--border-color); border-radius: 6px; margin-top: 10px; cursor: pointer; font-size: 1rem; transition: var(--transition);">إنشاء حساب جديد</button>
  </div>

  <script src="auth.js"></script>
</body>
</html>
